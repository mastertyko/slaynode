name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, Sign & Release
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Release
        run: swift build -c release

      - name: Run Tests
        run: swift test --parallel

      - name: Build App Bundle
        run: ./build.sh release

      - name: Import Code Signing Certificate
        if: env.CERTIFICATE_BASE64 != ''
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Code Sign App
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          if [ -n "$SIGNING_IDENTITY" ]; then
            codesign --force --deep --sign "$SIGNING_IDENTITY" \
              --entitlements SlayNode.entitlements \
              --options runtime \
              SlayNode.app
          else
            echo "No signing identity configured, using ad-hoc signing"
            codesign --force --deep --sign - \
              --entitlements SlayNode.entitlements \
              SlayNode.app
          fi

      - name: Notarize App
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent SlayNode.app SlayNode-notarize.zip
          
          xcrun notarytool submit SlayNode-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          
          xcrun stapler staple SlayNode.app
          rm SlayNode-notarize.zip

      - name: Create DMG
        run: |
          DMG_NAME="SlayNode-v${{ steps.version.outputs.VERSION }}.dmg"
          DMG_TEMP="dmg-contents"
          
          mkdir -p "$DMG_TEMP"
          cp -R SlayNode.app "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"
          
          hdiutil create -volname "SlayNode" \
            -srcfolder "$DMG_TEMP" \
            -ov -format UDZO \
            "$DMG_NAME"
          
          rm -rf "$DMG_TEMP"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Create ZIP
        run: |
          ZIP_NAME="SlayNode-v${{ steps.version.outputs.VERSION }}.zip"
          ditto -c -k --keepParent SlayNode.app "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Generate Release Notes
        id: notes
        run: |
          cat << 'EOF' > release-notes.md
          ## What's New in v${{ steps.version.outputs.VERSION }}
          
          ### Downloads
          - **DMG** (Recommended): Mount and drag to Applications
          - **ZIP**: Extract and move to Applications
          
          ### Installation
          1. Download the DMG or ZIP file
          2. Move SlayNode.app to your Applications folder
          3. Launch from Applications or Spotlight
          
          ### Requirements
          - macOS 13.0 (Ventura) or later
          - Apple Silicon or Intel Mac
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            ${{ env.DMG_NAME }}
            ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Keychain
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          fi
