name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to release
        required: false
        default: main
      version_override:
        description: Optional marketing version override
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event.inputs.git_ref || github.ref_name }}
  cancel-in-progress: false

env:
  XCODE_VERSION: '26.3'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
  CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
  SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}

jobs:
  build-and-release:
    name: Build, Sign & Release
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-26

    env:
      SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      SOURCE_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      VERSION_OVERRIDE: ${{ github.event.inputs.version_override }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.git_ref || github.ref }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Prepare scripts
        run: chmod +x build.sh script/extract_release_notes.sh

      - name: Extract release metadata
        id: metadata
        run: |
          VERSION_DEFAULT=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' XcodeSupport/Info.plist)
          MIN_SYSTEM_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' XcodeSupport/Info.plist)

          if [ -n "${VERSION_OVERRIDE}" ]; then
            VERSION="${VERSION_OVERRIDE}"
          else
            VERSION="${VERSION_DEFAULT}"
          fi

          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          RELEASE_TAG="v${VERSION}-build.${BUILD_NUMBER}"
          RELEASE_NAME="SlayNode v${VERSION} (build ${BUILD_NUMBER})"
          ARTIFACT_BASENAME="SlayNode-v${VERSION}-build.${BUILD_NUMBER}"

          {
            echo "version=${VERSION}"
            echo "build_number=${BUILD_NUMBER}"
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=${RELEASE_NAME}"
            echo "artifact_basename=${ARTIFACT_BASENAME}"
            echo "minimum_system_version=${MIN_SYSTEM_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Release
        run: swift build -c release

      - name: Run Tests
        run: swift test --parallel

      - name: Build App Bundle
        run: |
          SLAYNODE_VERSION="${{ steps.metadata.outputs.version }}" \
          SLAYNODE_BUILD_NUMBER="${{ steps.metadata.outputs.build_number }}" \
          SLAYNODE_SPARKLE_PUBLIC_ED_KEY="${SPARKLE_PUBLIC_ED_KEY}" \
          ./build.sh release

      - name: Import Code Signing Certificate
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Code Sign App
        run: |
          if [ -n "$SIGNING_IDENTITY" ]; then
            codesign --force --deep --sign "$SIGNING_IDENTITY" \
              --entitlements SlayNode.entitlements \
              --options runtime \
              SlayNode.app
          else
            echo "No signing identity configured, using ad-hoc signing"
            codesign --force --deep --sign - \
              --entitlements SlayNode.entitlements \
              SlayNode.app
          fi

      - name: Notarize App
        if: ${{ env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          ditto -c -k --keepParent SlayNode.app SlayNode-notarize.zip

          xcrun notarytool submit SlayNode-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple SlayNode.app
          rm SlayNode-notarize.zip

      - name: Create DMG
        run: |
          DMG_NAME="${{ steps.metadata.outputs.artifact_basename }}.dmg"
          DMG_TEMP="dmg-contents"

          rm -rf "$DMG_TEMP" "$DMG_NAME"
          mkdir -p "$DMG_TEMP"
          cp -R SlayNode.app "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"

          hdiutil create -volname "SlayNode" \
            -srcfolder "$DMG_TEMP" \
            -ov -format UDZO \
            "$DMG_NAME"

          rm -rf "$DMG_TEMP"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Create ZIP
        run: |
          ZIP_NAME="${{ steps.metadata.outputs.artifact_basename }}.zip"
          ditto -c -k --keepParent SlayNode.app "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Generate Release Notes
        run: |
          ./script/extract_release_notes.sh "${{ steps.metadata.outputs.version }}" > changelog-notes.md

          {
            echo "## Highlights"
            echo
            cat changelog-notes.md
            echo
            echo "## Downloads"
            echo
            echo "- **DMG** (recommended): mount and drag to Applications"
            echo "- **ZIP**: extract and move SlayNode.app to Applications"
            echo
            echo "## Requirements"
            echo
            echo "- macOS ${{ steps.metadata.outputs.minimum_system_version }} or later"
            echo
            echo "## Build Metadata"
            echo
            echo "- Version: ${{ steps.metadata.outputs.version }}"
            echo "- Build: ${{ steps.metadata.outputs.build_number }}"
            echo "- Commit: \`${SOURCE_SHA}\`"
            echo "- Branch: \`${SOURCE_BRANCH}\`"
            echo "- Workflow run: [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
          } > release-notes.md

      - name: Sync release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ steps.metadata.outputs.release_tag }}" -m "Release ${{ steps.metadata.outputs.release_name }}" "${SOURCE_SHA}"
          git push --force origin "refs/tags/${{ steps.metadata.outputs.release_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          name: ${{ steps.metadata.outputs.release_name }}
          target_commitish: ${{ env.SOURCE_SHA }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            ${{ env.DMG_NAME }}
            ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Keychain
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          fi
