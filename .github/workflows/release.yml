name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '26.3'
  CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
  CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
  SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  build-and-release:
    name: Build, Sign & Release
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Extract release metadata
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' XcodeSupport/Info.plist)
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' XcodeSupport/Info.plist)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Build Release
        run: swift build -c release

      - name: Run Tests
        run: swift test --parallel

      - name: Build App Bundle
        run: ./build.sh release

      - name: Import Code Signing Certificate
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Code Sign App
        run: |
          if [ -n "$SIGNING_IDENTITY" ]; then
            codesign --force --deep --sign "$SIGNING_IDENTITY" \
              --entitlements SlayNode.entitlements \
              --options runtime \
              SlayNode.app
          else
            echo "No signing identity configured, using ad-hoc signing"
            codesign --force --deep --sign - \
              --entitlements SlayNode.entitlements \
              SlayNode.app
          fi

      - name: Notarize App
        if: ${{ env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          ditto -c -k --keepParent SlayNode.app SlayNode-notarize.zip
          
          xcrun notarytool submit SlayNode-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          
          xcrun stapler staple SlayNode.app
          rm SlayNode-notarize.zip

      - name: Create DMG
        run: |
          DMG_NAME="SlayNode-v${{ steps.version.outputs.VERSION }}.dmg"
          DMG_TEMP="dmg-contents"
          
          mkdir -p "$DMG_TEMP"
          cp -R SlayNode.app "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"
          
          hdiutil create -volname "SlayNode" \
            -srcfolder "$DMG_TEMP" \
            -ov -format UDZO \
            "$DMG_NAME"
          
          rm -rf "$DMG_TEMP"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Create ZIP
        run: |
          ZIP_NAME="SlayNode-v${{ steps.version.outputs.VERSION }}.zip"
          ditto -c -k --keepParent SlayNode.app "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Generate Release Notes
        id: notes
        run: |
          cat << 'EOF' > release-notes.md
          ## What's New in v${{ steps.version.outputs.VERSION }}
          
          ### Downloads
          - **DMG** (Recommended): Mount and drag to Applications
          - **ZIP**: Extract and move to Applications
          
          ### Installation
          1. Download the DMG or ZIP file
          2. Move SlayNode.app to your Applications folder
          3. Launch from Applications or Spotlight
          
          ### Requirements
          - macOS 13.0 (Ventura) or later
          - Apple Silicon or Intel Mac
          
          ### Build Metadata
          - Build: ${{ steps.version.outputs.BUILD_NUMBER }}
          - Commit: ${{ github.sha }}
          EOF

      - name: Sync release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ steps.version.outputs.RELEASE_TAG }}" -m "Release ${{ steps.version.outputs.RELEASE_TAG }}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${{ steps.version.outputs.RELEASE_TAG }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.RELEASE_TAG }}
          name: SlayNode v${{ steps.version.outputs.VERSION }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            ${{ env.DMG_NAME }}
            ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Keychain
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          fi
