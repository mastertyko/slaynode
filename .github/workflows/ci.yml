name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '26.3'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26
    
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Extract artifact metadata
        id: metadata
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' XcodeSupport/Info.plist)
          MIN_SYSTEM_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' XcodeSupport/Info.plist)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "minimum_system_version=${MIN_SYSTEM_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Write build metadata artifact
        run: |
          mkdir -p ci-artifacts
          cat > ci-artifacts/release-metadata.json <<EOF
          {
            "version": "${{ steps.metadata.outputs.version }}",
            "build_number": "${{ steps.metadata.outputs.build_number }}",
            "minimum_macos": "${{ steps.metadata.outputs.minimum_system_version }}",
            "git_ref": "${GITHUB_REF}",
            "git_sha": "${GITHUB_SHA}"
          }
          EOF

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-swift-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-swift-
            ${{ runner.os }}-swift-

      - name: Prepare verification scripts
        run: chmod +x build.sh debug-port-detection.sh script/*.sh

      - name: Verify debug port samples
        run: ./debug-port-detection.sh --samples-only

      - name: Run shared verification gate
        run: ./script/full_verification.sh

      - name: Check whitespace regressions
        run: git diff --check

      - name: Build App Bundle
        run: |
          SLAYNODE_BUILD_NUMBER="${{ steps.metadata.outputs.build_number }}" ./build.sh release

      - name: Upload App Artifact
        uses: actions/upload-artifact@v7
        with:
          name: SlayNode-v${{ steps.metadata.outputs.version }}-ci.${{ steps.metadata.outputs.build_number }}
          path: SlayNode.app
          retention-days: 7

      - name: Upload Build Metadata Artifact
        uses: actions/upload-artifact@v7
        with:
          name: SlayNode-build-metadata-${{ steps.metadata.outputs.build_number }}
          path: ci-artifacts/release-metadata.json
          retention-days: 7
